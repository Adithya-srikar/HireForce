<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Take Interview — HireForce</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07070d;--surface:#10111a;--surface2:#181a27;--border:#252839;
  --text:#e4e6f0;--text2:#8b8fa8;--accent:#6366f1;--accent2:#818cf8;
  --green:#22c55e;--red:#ef4444;--yellow:#eab308;--cyan:#06b6d4;
  --radius:12px;--transition:.25s cubic-bezier(.4,0,.2,1);
}
html{font-size:15px}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}

header{padding:1rem 1.5rem;display:flex;align-items:center;gap:.8rem;border-bottom:1px solid var(--border);background:rgba(16,17,26,.9);backdrop-filter:blur(12px)}
header .logo{font-size:1.2rem;font-weight:700;background:linear-gradient(135deg,var(--accent),#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
header .status{font-size:.8rem;color:var(--text2);margin-left:1rem}
header .rec-dot{display:inline-block;width:8px;height:8px;background:var(--red);border-radius:50%;animation:blink 1.5s ease-in-out infinite;margin-right:.35rem}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
header .spacer{flex:1}
.voice-toggle{display:flex;align-items:center;gap:.5rem;font-size:.8rem;color:var(--text2);cursor:pointer;padding:.35rem .7rem;border:1px solid var(--border);border-radius:20px;background:var(--surface2);transition:all var(--transition)}
.voice-toggle:hover{border-color:var(--accent);color:var(--accent2)}
.voice-toggle.on{border-color:var(--cyan);color:var(--cyan);background:rgba(6,182,212,.08)}
.voice-toggle .dot{width:7px;height:7px;border-radius:50%;background:currentColor}

.layout{display:grid;grid-template-columns:300px 1fr;gap:0;min-height:calc(100vh - 57px)}
@media(max-width:860px){.layout{grid-template-columns:1fr}}

/* Agent panel */
.agent-panel{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:2rem 1.5rem;gap:1rem}
.agent-avatar-wrap{position:relative;margin-top:1rem}
.agent-avatar{width:130px;height:130px;border-radius:50%;background:linear-gradient(135deg,var(--surface2),var(--border));display:flex;align-items:center;justify-content:center;font-size:3.2rem;border:3px solid var(--accent);transition:border-color .3s}
.agent-avatar.speaking{border-color:var(--cyan);animation:avatarPulse 1s ease-in-out infinite}
@keyframes avatarPulse{0%,100%{box-shadow:0 0 0 0 rgba(6,182,212,.4)}50%{box-shadow:0 0 0 12px rgba(6,182,212,0)}}
.speaking-ring{position:absolute;inset:-8px;border-radius:50%;border:2px solid var(--cyan);opacity:0;transition:opacity .3s}
.agent-avatar.speaking ~ .speaking-ring{opacity:1;animation:ringPulse 1s ease-in-out infinite}
@keyframes ringPulse{0%,100%{transform:scale(1);opacity:.7}50%{transform:scale(1.08);opacity:.2}}
.agent-name{font-size:1rem;font-weight:600;color:var(--text2);text-align:center}
.agent-status{font-size:.78rem;color:var(--text2);margin-top:.15rem;text-align:center;min-height:1.2em;transition:color .2s}
.agent-status.speaking{color:var(--cyan)}
.agent-status.listening{color:var(--green)}

/* Mic button */
.mic-btn{width:64px;height:64px;border-radius:50%;border:2px solid var(--border);background:var(--surface2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.6rem;transition:all .2s;margin-top:.5rem}
.mic-btn:hover{border-color:var(--accent)}
.mic-btn.listening{border-color:var(--green);background:rgba(34,197,94,.12);animation:micPulse 1.2s ease-in-out infinite}
@keyframes micPulse{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,.4)}50%{box-shadow:0 0 0 10px rgba(34,197,94,0)}}
.mic-btn.disabled{opacity:.35;cursor:not-allowed}
.mic-label{font-size:.72rem;color:var(--text2);text-align:center}

.voice-hint{font-size:.72rem;color:var(--text2);text-align:center;padding:.5rem .75rem;background:var(--surface2);border-radius:8px;line-height:1.4;margin-top:.25rem}
.no-voice-warn{display:none;font-size:.72rem;color:var(--yellow);background:rgba(234,179,8,.08);border:1px solid rgba(234,179,8,.2);border-radius:8px;padding:.5rem .75rem;text-align:center;margin-top:.25rem}

/* Transcript */
.transcript-panel{display:flex;flex-direction:column;padding:1.5rem;max-height:calc(100vh - 57px);overflow:hidden}
.transcript-panel h2{font-size:1.1rem;margin-bottom:1rem}
.transcript-box{flex:1;overflow-y:auto;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;font-size:.9rem;min-height:200px}
.msg{margin-bottom:1rem}
.msg .role{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.25rem}
.msg.agent .role{color:var(--accent2)}
.msg.candidate .role{color:var(--green)}
.msg.system .role{color:var(--yellow)}
.msg .text{color:var(--text);white-space:pre-wrap}

.reply-row{display:flex;gap:.5rem;margin-top:1rem}
.reply-row input{flex:1;padding:.6rem .85rem;border:1px solid var(--border);border-radius:8px;background:var(--surface2);color:var(--text);font-size:.9rem}
.reply-row input:focus{outline:none;border-color:var(--accent)}
.reply-row .btn{padding:.6rem 1rem}

/* Interim STT display */
.interim-text{margin-top:.4rem;font-size:.82rem;color:var(--text2);font-style:italic;min-height:1.2em}

/* Code section */
.code-section{display:none;margin-top:1.5rem;border-top:1px solid var(--border);padding-top:1.5rem}
.code-section.show{display:block}
.code-section h3{font-size:1rem;margin-bottom:.75rem}
.code-section .problem-desc{font-size:.85rem;color:var(--text2);background:var(--surface2);border-radius:8px;padding:.75rem 1rem;margin-bottom:.75rem;white-space:pre-wrap;line-height:1.5}
.code-editor-wrap{border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;background:#0d1117}
.code-editor{width:100%;min-height:220px;padding:1rem;font-family:'Monaco','Menlo',monospace;font-size:13px;line-height:1.5;background:#0d1117;color:#e6edf3;border:none;outline:none;resize:vertical;tab-size:2}
.lang-select{margin-bottom:.5rem;display:flex;align-items:center;gap:.75rem}
.lang-select label{font-size:.78rem;color:var(--text2)}
.lang-select select{padding:.4rem .6rem;border-radius:6px;background:var(--surface2);color:var(--text);border:1px solid var(--border);font-size:.85rem}
.timer{font-size:.85rem;color:var(--yellow);margin-top:.5rem;font-weight:600}
.timer.warn{color:var(--red)}

/* Actions */
.actions{margin-top:1.5rem;display:flex;gap:.75rem;flex-wrap:wrap}
.btn{padding:.65rem 1.25rem;border:none;border-radius:var(--radius);font-size:.9rem;font-weight:600;cursor:pointer;transition:all var(--transition)}
.btn-primary{background:linear-gradient(135deg,var(--accent),#4f46e5);color:#fff}
.btn-primary:hover{opacity:.9}
.btn-danger{background:var(--red);color:#fff}
.btn-danger:hover{opacity:.9}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* Thinking indicator */
.thinking-dots{display:none;padding:.5rem 0}
.thinking-dots.show{display:flex;gap:.35rem;align-items:center}
.thinking-dots span{width:6px;height:6px;border-radius:50%;background:var(--accent2);animation:dot 1.2s ease-in-out infinite}
.thinking-dots span:nth-child(2){animation-delay:.2s}
.thinking-dots span:nth-child(3){animation-delay:.4s}
@keyframes dot{0%,80%,100%{transform:scale(0);opacity:.3}40%{transform:scale(1);opacity:1}}
</style>
</head>
<body>

<header>
  <div class="logo">HireForce</div>
  <span class="status"><span class="rec-dot"></span>Interview in progress</span>
  <div class="spacer"></div>
  <button type="button" class="voice-toggle on" id="voiceToggle" title="Toggle voice on/off">
    <span class="dot"></span> Voice On
  </button>
</header>

<div class="layout">
  <!-- Agent / Voice panel -->
  <aside class="agent-panel">
    <div class="agent-avatar-wrap">
      <div class="agent-avatar" id="agentAvatar">🤖</div>
      <div class="speaking-ring" id="speakingRing"></div>
    </div>
    <div class="agent-name">AI Interviewer</div>
    <div class="agent-status" id="agentStatus">Waiting…</div>

    <!-- Microphone button -->
    <button type="button" class="mic-btn disabled" id="micBtn" title="Click to speak">🎙️</button>
    <div class="mic-label" id="micLabel">Mic off</div>

    <div class="interim-text" id="interimText"></div>

    <div class="voice-hint" id="voiceHint">
      Agent speaks automatically.<br>Click 🎙️ to answer with your voice.
    </div>
    <div class="no-voice-warn" id="noVoiceWarn">
      Voice not supported in this browser. Use the text box below.
    </div>
  </aside>

  <!-- Transcript + code -->
  <main class="transcript-panel">
    <h2>Live transcript</h2>
    <div class="transcript-box" id="transcriptBox">
      <div class="thinking-dots show" id="loadingDots"><span></span><span></span><span></span></div>
    </div>

    <!-- Thinking indicator while waiting for agent -->
    <div class="thinking-dots" id="thinkingDots"><span></span><span></span><span></span></div>

    <div class="reply-row" id="replyRow" style="display:none">
      <input type="text" id="candidateInput" placeholder="Type your answer or use the mic…" autocomplete="off">
      <button type="button" class="btn btn-primary" id="btnSend">Send</button>
    </div>

    <div class="code-section" id="codeSection">
      <h3 id="codeProblemTitle">Coding Question</h3>
      <div class="problem-desc" id="codeProblemDesc">Loading problem…</div>
      <div class="lang-select">
        <label for="lang">Language:</label>
        <select id="lang" name="language">
          <option value="python">Python</option>
          <option value="javascript">JavaScript</option>
          <option value="java">Java</option>
          <option value="cpp">C++</option>
        </select>
      </div>
      <div class="code-editor-wrap">
        <textarea class="code-editor" id="codeEditor" placeholder="// Type your solution here..." spellcheck="false"></textarea>
      </div>
      <div class="timer" id="codeTimer">Time left: 5:00</div>
      <button type="button" class="btn btn-primary" id="btnSubmitCode" style="margin-top:.75rem">Submit Code</button>
    </div>

    <div class="actions">
      <button type="button" class="btn btn-primary" id="btnShowCode">Show Coding Question</button>
      <button type="button" class="btn btn-danger" id="btnEndInterview">End Interview & Generate Report</button>
    </div>
  </main>
</div>

<script>
(function(){
  /* ---- State ---- */
  var params       = new URLSearchParams(location.search);
  var interviewId  = params.get('interview_id');
  var sessionId    = null;
  var codingQuestion = {};
  var transcript   = [];
  var voiceOn      = true;
  var isListening  = false;
  var isSpeaking   = false;
  var agentBusy    = false;  // waiting for agent response
  var recognition  = null;
  var synth        = window.speechSynthesis;
  var hasSpeech    = 'speechSynthesis' in window;
  var hasSTT       = ('SpeechRecognition' in window || 'webkitSpeechRecognition' in window);
  var timerInterval = null;
  var silenceTimeout = null;
  var lastSpeechTime = 0;
  var silenceThreshold = 1500; // ms - auto-stop after 1.5s of silence

  /* ---- DOM refs ---- */
  var $  = function(id){ return document.getElementById(id); };
  var box      = $('transcriptBox');
  var replyRow = $('replyRow');
  var input    = $('candidateInput');
  var btnSend  = $('btnSend');
  var micBtn   = $('micBtn');
  var micLabel = $('micLabel');
  var agentAvatar = $('agentAvatar');
  var agentStatus = $('agentStatus');
  var voiceToggle = $('voiceToggle');
  var interimEl   = $('interimText');
  var thinkDots   = $('thinkingDots');
  var loadDots    = $('loadingDots');

  /* ---- TTS ---- */
  function speak(text, onDone){
    if (!hasSpeech || !voiceOn || !text){ if(onDone) onDone(); return; }
    synth.cancel();
    clearTimeout(silenceTimeout);
    var utt = new SpeechSynthesisUtterance(text);
    utt.rate  = 0.95;
    utt.pitch = 1;
    utt.lang  = 'en-US';
    isSpeaking = true;
    setAgentSpeaking(true);
    utt.onend = utt.onerror = function(){
      isSpeaking = false;
      setAgentSpeaking(false);
      if(onDone) onDone();
    };
    synth.speak(utt);
  }

  function setAgentSpeaking(on){
    agentAvatar.classList.toggle('speaking', on);
    agentStatus.className = 'agent-status' + (on ? ' speaking' : '');
    agentStatus.textContent = on ? 'Speaking…' : (isListening ? 'Listening…' : 'Ready');
  }

  /* ---- STT ---- */
  function initSTT(){
    if(!hasSTT){ $('noVoiceWarn').style.display='block'; $('voiceHint').style.display='none'; return; }
    var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognition = new SR();
    recognition.continuous      = true;
    recognition.interimResults  = true;
    recognition.lang            = 'en-US';
    recognition.maxAlternatives = 1;

    recognition.onstart = function(){
      isListening = true;
      micBtn.classList.add('listening');
      micLabel.textContent = 'Listening…';
      agentStatus.textContent = 'Listening…';
      agentStatus.className = 'agent-status listening';
      interimEl.textContent = '';
    };

    recognition.onresult = function(e){
      var interim = '', final = '';
      for(var i = e.resultIndex; i < e.results.length; i++){
        if(e.results[i].isFinal) final += e.results[i][0].transcript;
        else interim += e.results[i][0].transcript;
      }
      interimEl.textContent = interim || final;
      if(interim || final){
        lastSpeechTime = Date.now();
        // reset silence timeout
        clearTimeout(silenceTimeout);
        silenceTimeout = setTimeout(function(){
          if(isListening && recognition){
            try{ recognition.stop(); } catch(e){}
          }
        }, silenceThreshold);
      }
      if(final.trim()) input.value = final.trim();
    };

    recognition.onend = function(){
      isListening = false;
      clearTimeout(silenceTimeout);
      micBtn.classList.remove('listening');
      micLabel.textContent = 'Click to speak';
      agentStatus.textContent = 'Ready';
      agentStatus.className = 'agent-status';
      interimEl.textContent = '';
      // auto-send if text was captured and voice is on
      if(voiceOn && input.value.trim() && !agentBusy) sendMessage();
    };

    recognition.onerror = function(e){
      isListening = false;
      clearTimeout(silenceTimeout);
      micBtn.classList.remove('listening');
      micLabel.textContent = 'Click to speak';
      agentStatus.textContent = 'Ready';
      agentStatus.className = 'agent-status';
      if(e.error !== 'no-speech') interimEl.textContent = 'Error: ' + e.error;
    };
  }

  function startListening(){
    if(!hasSTT || agentBusy || isListening) return;
    if(isSpeaking) synth.cancel();
    lastSpeechTime = Date.now();
    clearTimeout(silenceTimeout);
    try{ recognition.start(); } catch(e){}
  }

  function stopListening(){
    if(!isListening) return;
    clearTimeout(silenceTimeout);
    try{ recognition.stop(); } catch(e){}
  }

  /* ---- Transcript rendering ---- */
  function esc(s){ var d=document.createElement('div'); d.textContent=s||''; return d.innerHTML; }

  function renderTranscript(){
    loadDots.style.display = 'none';
    box.innerHTML = transcript.map(function(m){
      var roleLabel = m.role === 'agent' ? 'AI Interviewer' : (m.role === 'system' ? 'System' : 'You');
      return '<div class="msg '+m.role+'"><div class="role">'+roleLabel+'</div><div class="text">'+esc(m.text)+'</div></div>';
    }).join('');
    // append thinking dots if agent is busy
    if(agentBusy){
      var d = document.createElement('div');
      d.className='thinking-dots show';
      d.innerHTML='<span></span><span></span><span></span>';
      box.appendChild(d);
    }
    box.scrollTop = box.scrollHeight;
  }

  function addMsg(role, text, skipRender){
    transcript.push({role:role, text:text});
    if(!skipRender) renderTranscript();
  }

  function setAgentBusy(on){
    agentBusy = on;
    btnSend.disabled  = on;
    micBtn.classList.toggle('disabled', on || !hasSTT);
    if(!on && hasSTT) micBtn.classList.remove('disabled');
    agentStatus.textContent = on ? 'Thinking…' : 'Ready';
    agentStatus.className = 'agent-status';
    renderTranscript();
  }

  /* ---- Send message ---- */
  function sendMessage(){
    var text = (input.value || '').trim();
    if(!text || !sessionId || agentBusy) return;
    input.value = '';
    interimEl.textContent = '';
    addMsg('candidate', text);
    setAgentBusy(true);

    var fd = new FormData();
    fd.set('candidate_message', text);
    fetch('/api/sessions/'+sessionId+'/turn', {method:'POST', body:fd})
      .then(function(r){ return r.json(); })
      .then(function(data){
        setAgentBusy(false);
        if(data.agent_message){
          addMsg('agent', data.agent_message);
          speak(data.agent_message, function(){
            // after speaking, auto-trigger mic if voice on
            if(voiceOn && hasSTT && !agentBusy){
              setTimeout(function(){ if(!isListening && !agentBusy) recognition.start(); }, 400);
            }
          });
        }
      })
      .catch(function(err){
        setAgentBusy(false);
        addMsg('system', 'Error: '+err.message);
      });
  }

  /* ---- Start session ---- */
  function startSession(){
    if(!interviewId){
      box.innerHTML = '<div class="msg system"><div class="role">System</div><div class="text">No interview_id. Open this page from Questions Preview.</div></div>';
      return;
    }
    var fd = new FormData();
    fd.set('interview_id', interviewId);
    fetch('/api/interviews/start', {method:'POST', body:fd})
      .then(function(r){ return r.json(); })
      .then(function(data){
        if(data.error){
          box.innerHTML='<div class="msg system"><div class="role">System</div><div class="text">'+esc(data.error)+'</div></div>';
          return;
        }
        sessionId = data.session_id;
        codingQuestion = data.coding_question || {};

        // set up coding section content
        if(codingQuestion.title) $('codeProblemTitle').textContent = codingQuestion.title;
        if(codingQuestion.description) $('codeProblemDesc').textContent = codingQuestion.description;
        setStarterCode('python');

        addMsg('agent', data.agent_message || 'Hello. Let\'s begin.');
        replyRow.style.display = 'flex';
        if(hasSTT) micBtn.classList.remove('disabled');
        micLabel.textContent = 'Click to speak';

        // auto-speak first message
        speak(data.agent_message || '', function(){
          if(voiceOn && hasSTT && !agentBusy){
            setTimeout(function(){ try{ recognition.start(); }catch(e){} }, 400);
          }
        });
      })
      .catch(function(err){
        box.innerHTML='<div class="msg system"><div class="role">System</div><div class="text">Failed to start: '+esc(err.message)+'</div></div>';
      });
  }

  function setStarterCode(lang){
    var key = 'starter_code_' + (lang === 'cpp' ? 'cpp' : lang === 'javascript' ? 'javascript' : lang === 'java' ? 'java' : 'python');
    var starter = codingQuestion[key] || codingQuestion.starter_code_python || '# Write your solution here\n';
    $('codeEditor').value = starter;
  }

  /* ---- Events ---- */
  btnSend.addEventListener('click', sendMessage);
  input.addEventListener('keydown', function(e){ if(e.key==='Enter') sendMessage(); });

  micBtn.addEventListener('click', function(){ if(!micBtn.classList.contains('disabled')) toggleMic(); });

  function toggleMic(){
    if(!hasSTT || agentBusy) return;
    if(isListening){ stopListening(); return; }
    startListening();
  }

  voiceToggle.addEventListener('click', function(){
    voiceOn = !voiceOn;
    voiceToggle.classList.toggle('on', voiceOn);
    voiceToggle.textContent = '';
    var dot = document.createElement('span'); dot.className='dot';
    voiceToggle.appendChild(dot);
    voiceToggle.appendChild(document.createTextNode(' Voice ' + (voiceOn ? 'On' : 'Off')));
    if(!voiceOn){ synth.cancel(); clearTimeout(silenceTimeout); if(isListening) stopListening(); }
  });

  $('lang').addEventListener('change', function(){ setStarterCode(this.value); });

  $('btnShowCode').addEventListener('click', function(){
    $('codeSection').classList.add('show');
    this.textContent = 'Coding question active';
    this.disabled = true;
    var start = Date.now();
    timerInterval = setInterval(function(){
      var left = Math.max(0, 300 - Math.floor((Date.now()-start)/1000));
      var m = Math.floor(left/60), s = left % 60;
      var t = $('codeTimer');
      t.textContent = 'Time left: '+m+':'+(s<10?'0':'')+s;
      t.classList.toggle('warn', left < 60);
      if(left <= 0){ clearInterval(timerInterval); $('btnSubmitCode').click(); }
    }, 1000);
    // tell agent coding phase started
    if(sessionId && codingQuestion.title){
      var msg = 'I see the coding question: ' + (codingQuestion.title || 'the problem');
      addMsg('system', 'Coding phase started. Problem: ' + (codingQuestion.title || ''));
    }
  });

  $('btnSubmitCode').addEventListener('click', function(){
    if(!sessionId) return;
    clearInterval(timerInterval);
    var code = $('codeEditor').value;
    var lang = $('lang').value;
    var fd = new FormData();
    fd.set('code', code);
    fd.set('language', lang);
    addMsg('system', 'Code submitted…');
    setAgentBusy(true);
    fetch('/api/sessions/'+sessionId+'/code', {method:'POST', body:fd})
      .then(function(r){ return r.json(); })
      .then(function(data){
        setAgentBusy(false);
        var msg = data.agent_message || '';
        if(data.evaluation){
          var ev = data.evaluation;
          msg += '\n\nCode evaluation: ' + (ev.passed ? '✓ Passed' : '✗ Not passing') + '. ' + (ev.feedback || '');
        }
        if(msg){ addMsg('agent', msg); speak(msg); }
      })
      .catch(function(err){
        setAgentBusy(false);
        addMsg('system', 'Code submission error: '+err.message);
      });
  });

  $('btnEndInterview').addEventListener('click', function(){
    if(!sessionId){ location.href='/interview-report'; return; }
    if(isListening) recognition.stop();
    synth.cancel();
    this.disabled = true;
    this.textContent = 'Generating report…';
    var fd = new FormData();
    fetch('/api/sessions/'+sessionId+'/end', {method:'POST', body:fd})
      .then(function(r){ return r.json(); })
      .then(function(data){
        location.href = '/interview-report?report_id=' + encodeURIComponent(data.report_id || '');
      })
      .catch(function(){ location.href = '/interview-report'; });
  });

  /* ---- Boot ---- */
  if(!hasSpeech) voiceOn = false;
  initSTT();
  if(!hasSTT){ voiceOn = false; }
  if(!voiceOn){
    voiceToggle.classList.remove('on');
    voiceToggle.innerHTML = '<span class="dot"></span> Voice Off';
  }
  startSession();
})();
</script>
</body>
</html>
