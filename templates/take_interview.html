<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Take Interview — HireForce</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07070d;--surface:#10111a;--surface2:#181a27;--border:#252839;
  --text:#e4e6f0;--text2:#8b8fa8;--accent:#6366f1;--accent2:#818cf8;
  --green:#22c55e;--red:#ef4444;--yellow:#eab308;--radius:12px;--transition:.25s cubic-bezier(.4,0,.2,1);
}
html{font-size:15px}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.6}

header{padding:1rem 1.5rem;display:flex;align-items:center;gap:.8rem;border-bottom:1px solid var(--border);background:rgba(16,17,26,.9);backdrop-filter:blur(12px)}
header .logo{font-size:1.2rem;font-weight:700;background:linear-gradient(135deg,var(--accent),#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
header .status{font-size:.8rem;color:var(--text2);margin-left:1rem}
header .rec-dot{display:inline-block;width:8px;height:8px;background:var(--red);border-radius:50%;animation:pulse 1.5s ease-in-out infinite;margin-right:.35rem}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
header .spacer{flex:1}

.layout{display:grid;grid-template-columns:320px 1fr;gap:0;min-height:calc(100vh - 56px)}
@media(max-width:900px){.layout{grid-template-columns:1fr}}

/* Agent / Video area */
.agent-panel{background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;min-height:320px}
.agent-avatar{width:140px;height:140px;border-radius:50%;background:linear-gradient(135deg,var(--surface2),var(--border));display:flex;align-items:center;justify-content:center;font-size:3.5rem;margin-bottom:1rem;border:3px solid var(--accent)}
.agent-name{font-size:1rem;font-weight:600;color:var(--text2)}
.agent-desc{font-size:.8rem;color:var(--text2);margin-top:.25rem}
.tts-placeholder{font-size:.75rem;color:var(--text2);margin-top:1rem;padding:.5rem .75rem;background:var(--surface2);border-radius:8px}
.stt-placeholder{font-size:.75rem;color:var(--text2);margin-top:.5rem}

/* Transcript */
.transcript-panel{display:flex;flex-direction:column;padding:1.5rem;max-height:calc(100vh - 56px);overflow:hidden}
.transcript-panel h2{font-size:1.1rem;margin-bottom:1rem}
.transcript-box{flex:1;overflow-y:auto;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;font-size:.9rem;min-height:200px}
.msg{margin-bottom:1rem}
.msg .role{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:.25rem}
.msg.agent .role{color:var(--accent2)}
.msg.candidate .role{color:var(--green)}
.msg .text{color:var(--text)}
.reply-row{display:flex;gap:.5rem;margin-top:1rem}
.reply-row input{flex:1;padding:.6rem .85rem;border:1px solid var(--border);border-radius:8px;background:var(--surface2);color:var(--text);font-size:.9rem}
.reply-row input:focus{outline:none;border-color:var(--accent)}
.reply-row .btn{padding:.6rem 1rem}

/* Code section (shown at “coding question” phase) */
.code-section{display:none;margin-top:1.5rem;border-top:1px solid var(--border);padding-top:1.5rem}
.code-section.show{display:block}
.code-section h3{font-size:1rem;margin-bottom:.75rem}
.code-section .hint{font-size:.8rem;color:var(--text2);margin-bottom:.5rem}
.code-editor-wrap{border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;background:#0d1117}
.code-editor{width:100%;min-height:220px;padding:1rem;font-family:'Monaco','Menlo',monospace;font-size:13px;line-height:1.5;background:#0d1117;color:#e6edf3;border:none;outline:none;resize:vertical}
.lang-select{margin-bottom:.5rem}
.lang-select label{font-size:.78rem;color:var(--text2);margin-right:.5rem}
.lang-select select{padding:.4rem .6rem;border-radius:6px;background:var(--surface2);color:var(--text);border:1px solid var(--border);font-size:.85rem}
.timer{font-size:.85rem;color:var(--yellow);margin-top:.5rem}
.timer.warn{color:var(--red)}

/* Actions */
.actions{margin-top:1.5rem;display:flex;gap:.75rem;flex-wrap:wrap}
.btn{padding:.65rem 1.25rem;border:none;border-radius:var(--radius);font-size:.9rem;font-weight:600;cursor:pointer;transition:all var(--transition)}
.btn-primary{background:linear-gradient(135deg,var(--accent),#4f46e5);color:#fff}
.btn-primary:hover{opacity:.9}
.btn-danger{background:var(--red);color:#fff}
.btn-danger:hover{opacity:.9}
</style>
</head>
<body>

<header>
  <div class="logo">HireForce</div>
  <span class="status"><span class="rec-dot"></span> Interview in progress</span>
  <div class="spacer"></div>
</header>

<div class="layout">
  <aside class="agent-panel">
    <div class="agent-avatar">🤖</div>
    <div class="agent-name">AI Interviewer</div>
    <div class="agent-desc">Voice + follow-ups (TTS/STT placeholder)</div>
    <div class="tts-placeholder">TTS: agent speech (open-source placeholder)</div>
    <div class="stt-placeholder">STT: your speech → transcript below</div>
  </aside>

  <main class="transcript-panel">
    <h2>Live transcript</h2>
    <div class="transcript-box" id="transcriptBox">Loading session…</div>
    <div class="reply-row" id="replyRow" style="display:none">
      <input type="text" id="candidateInput" placeholder="Type your answer…" autocomplete="off">
      <button type="button" class="btn btn-primary" id="btnSend">Send</button>
    </div>

    <div class="code-section" id="codeSection">
      <h3>Coding question (max 5 min)</h3>
      <p class="hint" id="codeHint">Write your solution below.</p>
      <div class="lang-select">
        <label for="lang">Language:</label>
        <select id="lang" name="language">
          <option value="python">Python</option>
          <option value="javascript">JavaScript</option>
          <option value="java">Java</option>
          <option value="cpp">C++</option>
        </select>
      </div>
      <textarea class="code-editor" id="codeEditor" placeholder="// Type your solution here..." spellcheck="false"></textarea>
      <div class="timer" id="codeTimer">Time left: 5:00</div>
      <button type="button" class="btn btn-primary" id="btnSubmitCode" style="margin-top:.5rem">Submit code</button>
    </div>

    <div class="actions">
      <button type="button" class="btn btn-primary" id="btnShowCode">Show coding question</button>
      <button type="button" class="btn btn-danger" id="btnEndInterview">End interview & generate report</button>
    </div>
  </main>
</div>

<script>
(function(){
  var params = new URLSearchParams(location.search);
  var interviewId = params.get('interview_id');
  var sessionId = null;
  var codingQuestion = {};
  var transcript = [];

  function renderTranscript(){
    var box = document.getElementById('transcriptBox');
    box.innerHTML = transcript.map(function(m){
      var role = m.role === 'agent' ? 'Agent' : 'Candidate';
      var cls = m.role === 'agent' ? 'agent' : 'candidate';
      return '<div class="msg ' + cls + '"><div class="role">' + role + '</div><div class="text">' + escapeHtml(m.text) + '</div></div>';
    }).join('');
    box.scrollTop = box.scrollHeight;
  }
  function escapeHtml(s){ var d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

  function addToTranscript(role, text){
    transcript.push({ role: role, text: text });
    renderTranscript();
  }

  function startSession(){
    if (!interviewId) {
      document.getElementById('transcriptBox').innerHTML = '<p>No interview_id. Open from Questions Preview.</p>';
      return;
    }
    var fd = new FormData();
    fd.set('interview_id', interviewId);
    fetch('/api/interviews/start', { method: 'POST', body: fd })
      .then(function(r){ return r.json(); })
      .then(function(data){
        if (data.error) {
          document.getElementById('transcriptBox').innerHTML = '<p>' + escapeHtml(data.error) + '</p>';
          return;
        }
        sessionId = data.session_id;
        codingQuestion = data.coding_question || {};
        addToTranscript('agent', data.agent_message || 'Hello. Let\'s begin.');
        document.getElementById('replyRow').style.display = 'flex';
        document.getElementById('codeHint').textContent = codingQuestion.description || 'Write your solution below.';
        var lang = document.getElementById('lang').value;
        var key = 'starter_code_' + (lang === 'cpp' ? 'cpp' : lang === 'javascript' ? 'javascript' : lang === 'java' ? 'java' : 'python');
        var starter = codingQuestion[key] || codingQuestion.starter_code_python || 'def solution():\n    pass';
        document.getElementById('codeEditor').value = starter;
      })
      .catch(function(err){
        document.getElementById('transcriptBox').innerHTML = '<p>Failed to start: ' + escapeHtml(err.message) + '</p>';
      });
  }

  document.getElementById('btnSend').addEventListener('click', function(){
    var input = document.getElementById('candidateInput');
    var text = (input.value || '').trim();
    if (!text || !sessionId) return;
    input.value = '';
    addToTranscript('candidate', text);
    var fd = new FormData();
    fd.set('candidate_message', text);
    fetch('/api/sessions/' + sessionId + '/turn', { method: 'POST', body: fd })
      .then(function(r){ return r.json(); })
      .then(function(data){
        if (data.agent_message) addToTranscript('agent', data.agent_message);
      });
  });
  document.getElementById('candidateInput').addEventListener('keydown', function(e){
    if (e.key === 'Enter') document.getElementById('btnSend').click();
  });

  document.getElementById('btnShowCode').addEventListener('click', function(){
    document.getElementById('codeSection').classList.add('show');
    this.textContent = 'Coding question active';
    this.disabled = true;
    var start = Date.now();
    var interval = setInterval(function(){
      var left = Math.max(0, 300 - Math.floor((Date.now() - start) / 1000));
      var m = Math.floor(left / 60), s = left % 60;
      document.getElementById('codeTimer').textContent = 'Time left: ' + m + ':' + (s < 10 ? '0' : '') + s;
      document.getElementById('codeTimer').classList.toggle('warn', left < 60);
      if (left <= 0) clearInterval(interval);
    }, 1000);
  });

  document.getElementById('btnSubmitCode').addEventListener('click', function(){
    if (!sessionId) return;
    var code = document.getElementById('codeEditor').value;
    var lang = document.getElementById('lang').value;
    var fd = new FormData();
    fd.set('code', code);
    fd.set('language', lang);
    fetch('/api/sessions/' + sessionId + '/code', { method: 'POST', body: fd })
      .then(function(r){ return r.json(); })
      .then(function(data){
        if (data.agent_message) addToTranscript('agent', data.agent_message);
        if (data.evaluation) addToTranscript('agent', 'Code feedback: ' + (data.evaluation.feedback || '') + ' (passed: ' + data.evaluation.passed + ')');
      });
  });

  document.getElementById('btnEndInterview').addEventListener('click', function(){
    if (!sessionId) { location.href = '/interview-report'; return; }
    var fd = new FormData();
    fetch('/api/sessions/' + sessionId + '/end', { method: 'POST', body: fd })
      .then(function(r){ return r.json(); })
      .then(function(data){
        location.href = '/interview-report?report_id=' + encodeURIComponent(data.report_id || '');
      })
      .catch(function(){ location.href = '/interview-report'; });
  });

  document.getElementById('lang').addEventListener('change', function(){
    var lang = this.value;
    var key = 'starter_code_' + (lang === 'cpp' ? 'cpp' : lang === 'javascript' ? 'javascript' : lang === 'java' ? 'java' : 'python');
    var starter = codingQuestion[key] || codingQuestion.starter_code_python || '';
    if (starter) document.getElementById('codeEditor').value = starter;
  });

  if (interviewId) startSession();
  else {
    document.getElementById('transcriptBox').innerHTML = '<div class="msg agent"><div class="role">Agent</div><div class="text">Open this page from Questions Preview (Take Interview) to start a live session.</div></div>';
    document.getElementById('replyRow').style.display = 'none';
  }
})();
</script>
</body>
</html>
